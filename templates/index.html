<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Letter Position Checker</title>
</head>
<body>
    <h2>Преобразование букв в их порядковые номера в латинском алфавите</h2>
    <form method="post">
        <label for="user_input">Введите строку (только латинские буквы):</label><br>
        <input type="text" id="user_input" name="user_input" required>
        <button type="submit">Отправить</button>
    </form>
    <div>
        <h3>Результат:</h3>
        <p>{{ result }}</p>
    </div>
</body>
</html>
